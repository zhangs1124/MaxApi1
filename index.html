<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX 報價</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="popup">
        <header class="popup-header">
            <div class="popup-title">
                <span class="title-text">MAX & 股票助手</span>
                <span id="version" class="version"></span>
            </div>
            <div class="header-actions">
                <button id="refresh" class="btn-icon" type="button" title="立即更新">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                </button>
                <button id="toggleConfig" class="btn-icon" type="button" title="設定">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <button id="toggleHelp" class="btn-icon" type="button" title="使用說明">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </button>
            </div>
        </header>

        <section class="card config-card hidden" id="helpCard">
            <div style="font-size: 12px; line-height: 1.6; color: var(--text-muted);">
                <strong style="color: var(--primary);">💡 簡易使用說明：</strong><br>
                1. **新增台股**：輸入純數字代號（如 <code>0050</code>、<code>2330</code>）後點選「新增」。<br>
                2. **新增加密貨幣**：輸入交易對代碼（如 <code>usdttwd</code>、<code>btcusdt</code>）後點選「新增」。<br>
                3. **Badge 顯示**：點選卡片左側的單選圓圈，可將該價格顯示在 Chrome 右上角圖示上。<br>
                4. **價格警報**：在卡片輸入「高標/低標」數值並勾選「啟用示警」，達標時將收到系統推播。
            </div>
        </section>

        <section class="card config-card hidden" id="configCard">
            <div class="form-row">
                <label class="form-label" for="scheduleMode">排程模式</label>
                <select id="scheduleMode" class="input">
                    <option value="interval">固定間隔</option>
                    <option value="daily">每日時間</option>
                </select>
            </div>
            <div class="form-row">
                <label class="form-label" for="intervalMinutes">間隔 分鐘</label>
                <input id="intervalMinutes" class="input" type="number" min="1" max="1440" step="1">
            </div>
            <div class="form-row">
                <label class="form-label" for="dailyTime">每日時間</label>
                <input id="dailyTime" class="input" type="time">
            </div>
            <div class="form-row">
                <label class="form-label" for="badgeMode">徽章數值</label>
                <select id="badgeMode" class="input">
                    <option value="last">最新</option>
                    <option value="buy">買</option>
                    <option value="sell">賣</option>
                </select>
            </div>
            <div class="form-row">
                <label class="form-label" for="notifyOnAlarm">啟用通知</label>
                <label class="toggle">
                    <input id="notifyOnAlarm" type="checkbox">
                    <span class="toggle-ui"></span>
                </label>
            </div>
            <div class="actions">
                <button id="save" class="btn btn-primary" type="button" style="width: 100%;">保存設定</button>
            </div>
        </section>

        <div class="add-section">
            <input id="newMarket" class="input" type="text" placeholder="填入股票/幣別代碼新增 (如: 2330, usdttwd)">
            <button id="addMarket" class="btn btn-primary" type="button">新增</button>
        </div>

        <div id="markets" class="market-container"></div>

        <footer class="popup-footer">
            <div id="status" class="status" aria-live="polite"></div>
            <div id="lastFetchTime" class="status" aria-live="polite"></div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
